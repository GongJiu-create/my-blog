backend:
  name: git-gateway
  branch: main  # 你的网站使用的 Git 分支

media_folder: "source/images/uploads"  # 上传的媒体文件存放位置
public_folder: "/images/uploads"  # 媒体文件的公开路径

collections:
  - name: "posts"  # 文章集合名称
    label: "文章"
    folder: "_posts"  # Hexo 默认的文章存放目录
    create: true  # 允许创建新文章
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"  # 文章的 URL 格式
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "日期", name: "date", widget: "datetime" }
      - { label: "内容", name: "body", widget: "markdown" }
      - { label: "封面图", name: "cover", widget: "image" }